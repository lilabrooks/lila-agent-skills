version: 2

updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      python-tooling:
        patterns:
          - "*"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      workflow-actions:
        patterns:
          - "*"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore(deps)"
